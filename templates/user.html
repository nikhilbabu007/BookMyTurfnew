<!DOCTYPE HTML>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyTurf - Explore Your Playground</title>
    <link rel="shortcut icon" href="{% static 'images1/logo-black-and-white.png' %}" type="image/png">

    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="{% static 'dashboard/css/font-awesome.css' %}" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="{% static 'dashboard/css/bootstrap.min.css' %}" rel="stylesheet">

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            background-image: url("{% static 'images1/207329881-generative-ai-grass-inside-the-football-stadium.jpg' %}");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
        }

        .navbar {
            background: #fff;
            padding: 15px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 3px solid #00b894;
            display: flex;
            justify-content: center;
        }
        .navbar ul {
            list-style: none;
            display: flex;
            gap: 40px;
            margin: 0;
            padding: 0;
        }
        .navbar li { position: relative; }
        .navbar a {
            color: #00b894;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            padding: 10px 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .navbar a:hover {
            background: #00b894;
            color: #fff;
            transform: translateY(-2px);
        }

        .main-content {
            max-width: 1200px;
            margin: 50px auto 100px auto;
            padding: 20px;
        }

        .header-section {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            color: #00b894;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-bottom: 50px;
            position: relative;
        }

        .header-section input[type="text"] {
            width: 250px;
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid #00b894;
            font-size: 16px;
            font-weight: 500;
            color: #333;
            outline: none;
            transition: all 0.3s ease;
        }

        .header-section input[type="text"]:focus {
            border-color: #0984e3;
            box-shadow: 0 0 10px rgba(9,132,227,0.2);
        }

        .custom-submit {
            padding: 12px 25px;
            margin-left: 15px;
            background: #00b894;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .custom-submit:hover {
            background: #0984e3;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        /* Autocomplete dropdown */
        .autocomplete-suggestions {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            border: 1px solid #00b894;
            border-radius: 10px;
            width: 270px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 999;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }

        .autocomplete-suggestion {
            padding: 10px 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .autocomplete-suggestion:hover {
            background: #00b894;
            color: #fff;
        }

        .no-result {
            padding: 10px 15px;
            color: #ff3b3b;
            font-weight: 600;
        }

        /* Banner */
        .banner {
            text-align: center;
            padding: 80px 20px;
            background: #fff;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            animation: fadeInUp 1s ease-out;
        }
        .banner span {
            font-size: 22px;
            color: #00b894;
            display: block;
            margin-bottom: 15px;
        }
        .banner h3 {
            font-size: 50px;
            font-weight: 700;
            color: #0984e3;
            margin-bottom: 25px;
        }
        .banner a {
            display: inline-block;
            padding: 18px 35px;
            background: #00b894;
            color: #fff;
            font-weight: 700;
            border-radius: 12px;
            text-decoration: none;
            font-size: 18px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .banner a:hover {
            background: #0984e3;
            transform: translateY(-3px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.25);
        }

        @media (max-width: 768px) {
            .navbar ul { flex-direction: column; gap: 15px; }
            .header-section { padding: 25px; }
            .header-section input[type="text"], .custom-submit { width: 100%; margin: 10px 0 0 0; }
            .banner h3 { font-size: 36px; }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <ul>
        <li><a href="userpro"><i class="glyphicon glyphicon-user"></i> Profile</a></li>
        <li><a href="{% url 'view_bookings' %}"><i class="glyphicon glyphicon-list-alt"></i> View Bookings</a></li>
        <li><a href="login.html"><i class="glyphicon glyphicon-log-out"></i> Logout</a></li>
    </ul>
</nav>

<!-- Main Content -->
<div class="main-content">

    <!-- Search Section -->
    <div class="header-section">
        <form method="POST" action="locfil.html" class="search-form" autocomplete="off">
            {% csrf_token %}
            <label><b>Search By Location</b></label>
            <input type="text" name="f1" id="location-search" placeholder="Type location...">
            <div id="suggestions" class="autocomplete-suggestions"></div>
            <input type="submit" class="custom-submit" value="Search">
        </form>
    </div>

    <!-- Banner -->
    <div class="banner">
        <span>SEARCH FOR</span>
        <h3>YOUR PLAYGROUND</h3>
        <a href="bkslot" role="button">Explore Now</a>
    </div>
</div>

<!-- Scripts -->
<script src="{% static 'dashboard/js/jquery-1.10.2.min.js' %}"></script>
<script src="{% static 'dashboard/js/bootstrap.min.js' %}"></script>
<script>
    const locations = [
        {% for i in r1 %}
        "{{ i }}",
        {% endfor %}
    ];

    const searchInput = document.getElementById('location-search');
    const suggestionsBox = document.getElementById('suggestions');

    searchInput.addEventListener('input', function() {
        const value = this.value.toLowerCase();
        suggestionsBox.innerHTML = '';
        if (!value) return;

        const filtered = locations.filter(loc => loc.toLowerCase().includes(value));
        if (filtered.length === 0) {
            const noResult = document.createElement('div');
            noResult.classList.add('no-result');
            noResult.textContent = 'No result found';
            suggestionsBox.appendChild(noResult);
        } else {
            filtered.forEach(loc => {
                const div = document.createElement('div');
                div.classList.add('autocomplete-suggestion');
                div.textContent = loc;
                div.addEventListener('click', () => {
                    searchInput.value = loc;
                    suggestionsBox.innerHTML = '';
                });
                suggestionsBox.appendChild(div);
            });
        }
    });

    // Close suggestions when clicking outside
    document.addEventListener('click', function(e) {
        if (!searchInput.contains(e.target)) {
            suggestionsBox.innerHTML = '';
        }
    });
</script>
</body>
</html>
