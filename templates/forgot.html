<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #333;
    }

    .forgot-container {
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
      padding: 40px 30px;
      text-align: center;
      position: relative;
      animation: fadeIn 1s ease forwards;
    }

    .forgot-container h2 {
      margin-bottom: 20px;
      font-weight: 700;
      color: #0072ff;
    }

    .forgot-container p {
      font-size: 0.95rem;
      margin-bottom: 30px;
      color: #555;
    }

    .form-control {
      border-radius: 10px;
      padding: 12px 15px;
      font-size: 1rem;
      border: 1px solid #ccc;
      transition: all 0.3s ease;
    }
    .form-control:focus {
      outline: none;
      border-color: #0072ff;
      box-shadow: 0 0 8px rgba(0,114,255,0.3);
    }

    .btn-reset {
      background: #0072ff;
      color: #fff;
      font-weight: 600;
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      width: 100%;
      transition: all 0.3s ease;
    }
    .btn-reset:hover {
      background: #005bb5;
      transform: translateY(-2px);
    }

    .back-login {
      display: inline-block;
      margin-top: 20px;
      color: #0072ff;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .back-login:hover { text-decoration: underline; color: #005bb5; }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(-20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media(max-width: 480px) {
      .forgot-container { padding: 30px 20px; }
      h2 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="forgot-container">
    <h2>Forgot Password?</h2>
    <p>Enter your registered email address below and we'll send you instructions to reset your password.</p>
    <form action="forgot" method="POST">
      {% csrf_token %}
      <input type="email" name="email" placeholder="Email Address" class="form-control mb-3" required>
      <button type="submit" class="btn-reset">Send Reset Link</button>
    </form>
    <a href="login.html" class="back-login">← Back to Login</a>
  </div>
</body>
</html>
