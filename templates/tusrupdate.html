
<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turf Username Update | BookMyTurf</title>
    <link rel="shortcut icon" href="{% static 'images1/logo-black-and-white.png' %}" type="image/png">

    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="{% static 'register/css/font-awesome.min.css' %}" rel="stylesheet">

    <style>
        /* ===== Base Styles ===== */
        body {
            font-family: 'Montserrat', sans-serif;
            background:
                linear-gradient(rgba(0, 60, 0, 0.7), rgba(0, 0, 0, 0.8)),
                url("{% static 'images1/207329881-generative-ai-grass-inside-the-football-stadium.jpg' %}") no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ===== Back Button ===== */
        .back-link {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #FFD700;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .back-link:hover {
            color: #FFA500;
        }

        /* ===== Main Container ===== */
        .update-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 50px 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        .update-box h2 {
            font-size: 2em;
            margin-bottom: 30px;
            color: #FFD700;
            letter-spacing: 1px;
        }

        /* ===== Input Fields ===== */
        .update-box input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border-radius: 25px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 1em;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .update-box input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 8px #FFD700;
        }

        /* ===== Submit Button ===== */
        .update-box input[type="submit"] {
            background: #FFD700;
            color: #000;
            border: none;
            border-radius: 25px;
            padding: 12px 40px;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .update-box input[type="submit"]:hover {
            background: #FFA500;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        /* ===== Messages ===== */
        .messages {
            margin-top: 20px;
        }
        .messages h4 {
            color: #FFD700;
            font-weight: 500;
            text-align: center;
        }

        /* ===== Footer ===== */
        footer {
            text-align: center;
            color: #ccc;
            font-size: 0.9em;
            margin-top: 30px;
        }

        @media (max-width: 480px) {
            .update-box {
                padding: 35px 25px;
            }
            .update-box h2 {
                font-size: 1.7em;
            }
        }
    </style>
</head>

<body>
    <!-- Back Button -->
    <a href="profile" class="back-link"><i class="fa fa-chevron-left"></i> Back</a>

    <!-- Main Update Box -->
    <div class="update-box">
        <h2>Turf Username Update</h2>
        <form action="usrnm" method="POST">
            {% csrf_token %}
            <input type="text" name="n1" placeholder="Enter old username" required>
            <input type="text" name="n2" placeholder="Enter new username" required>
            <input type="submit" value="UPDATE" onclick="return confirm('Are you sure you want to update your username?')">
        </form>

        <div class="messages">
            {% for i in messages %}
                <h4>{{ i }}</h4>
            {% endfor %}
        </div>
    </div>

    <footer>
        © 2025 BookMyTurf — Secure Turf Management
    </footer>
</body>
</html>
