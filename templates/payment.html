<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
  <meta charset="UTF-8">
  <title>Payment | BookMyTurf</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow-lg p-4 mx-auto" style="max-width: 600px;">
    <h3 class="text-center text-success">Confirm Payment</h3>
    <hr>
    <p><strong>Turf:</strong> {{ turf.name }} ({{ turf.location }})</p>
    <p><strong>Date:</strong> {{ payment_data.date }}</p>
    <p><strong>Slots:</strong> {{ payment_data.slots|join:", " }}</p>
    <p><strong>Total Amount:</strong> ₹{{ payment_data.amount }}</p>

    <form method="POST" action="payment">
      {% csrf_token %}
      <button type="submit" class="btn btn-success w-100 mt-3">Pay ₹{{ payment_data.amount }}</button>
    </form>

    <a href="{% url 'book_turf' turf.name %}" class="btn btn-link mt-2">Cancel</a>
  </div>
</div>

</body>
</html>
