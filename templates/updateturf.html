<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turf Update | BookMyTurf</title>
    <link rel="shortcut icon" href="{% static 'images1/logo-black-and-white.png' %}" type="image/png">

    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="{% static 'register/css/font-awesome.min.css' %}" rel="stylesheet">

    <style>
        /* ===== Base Styles ===== */
        body {
            font-family: 'Montserrat', sans-serif;
            background:
                linear-gradient(rgba(0, 60, 0, 0.75), rgba(0, 0, 0, 0.85)),
                url("{% static 'images1/207329881-generative-ai-grass-inside-the-football-stadium.jpg' %}") no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        /* ===== Back Button ===== */
        .back-link {
            position: absolute;
            top: 25px;
            left: 25px;
            color: #FFD700;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .back-link:hover {
            color: #FFA500;
        }

        /* ===== Main Container ===== */
        .update-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 40px 35px;
            width: 90%;
            max-width: 500px;
            margin-top: 90px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        .update-box h2 {
            font-size: 2em;
            margin-bottom: 25px;
            color: #FFD700;
            letter-spacing: 1px;
        }

        /* ===== Input Fields ===== */
        .update-box input[type="text"],
        .update-box input[type="email"],
        .update-box input[type="number"],
        .update-box input[type="file"] {
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 25px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 0.95em;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .update-box input:focus {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 8px #FFD700;
        }

        /* ===== Submit Button ===== */
        .update-box input[type="submit"] {
            background: #FFD700;
            color: #000;
            border: none;
            border-radius: 25px;
            padding: 12px 40px;
            font-weight: 700;
            margin-top: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .update-box input[type="submit"]:hover {
            background: #FFA500;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        /* ===== Messages & Footer ===== */
        .messages {
            margin-top: 20px;
        }
        .messages h4 {
            color: #FFD700;
            font-weight: 500;
        }

        footer {
            text-align: center;
            color: #ccc;
            font-size: 0.9em;
            margin-top: 30px;
        }

        @media (max-width: 480px) {
            .update-box {
                padding: 30px 25px;
            }
            .update-box h2 {
                font-size: 1.6em;
            }
        }
    </style>
</head>

<body>
    <!-- Back Button -->
    <a href="profile" class="back-link"><i class="fa fa-chevron-left"></i> Back</a>

    <!-- Main Update Box -->
    <div class="update-box">
        <h2>Turf Update</h2>
        <form action="uptrf" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {% for i in r %}
                <input type="hidden" name="n2" value="{{ i.username }}">

                <input type="text" name="n1" value="{{ i.name }}" placeholder="Name" required>
                <input type="text" name="n3" value="{{ i.address }}" placeholder="Address" required>
                <input type="text" name="n4" value="{{ i.location }}" placeholder="Location" required>
                <input type="text" name="n5" value="{{ i.owner }}" placeholder="Owner" required>
                <input type="text" name="n6" value="{{ i.time }}" placeholder="Time" required>
                <input type="email" name="n7" value="{{ i.email }}" placeholder="Email" pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$">
                <input type="text" name="n10" value="{{ i.phno }}" placeholder="Phone Number" pattern="[0-9]{10}">
                <input type="text" name="n11" value="{{ i.pricing }}" placeholder="Pricing" required>
                <input type="text" name="n12" value="{{ i.turf_type }}" placeholder="Turf Type" required>
                <input type="text" name="n13" value="{{ i.surface_type }}" placeholder="Surface Type" required>
                <input type="text" name="n14" value="{{ i.lighting }}" placeholder="Lighting" required>
                <input type="text" name="n18" value="{{ i.owner_phno }}" placeholder="Owner Phone Number" pattern="[0-9]{10}">
                <input type="email" name="n17" value="{{ i.owner_email }}" placeholder="Owner Email" pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$">
            {% endfor %}
            <input type="submit" value="UPDATE" onclick="return confirm('Are you sure you want to update this turf information?')">
        </form>
    </div>

    <footer>
        © 2025 BookMyTurf — Manage Your Turf Smartly
    </footer>
</body>
</html>
