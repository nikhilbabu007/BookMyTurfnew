<!DOCTYPE HTML>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="{% static 'images1/logo-black-and-white.png' %}" type="image/png">
    <title>BookMyTurf | Turf Details</title>

    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="{% static 'dashboard/css/font-awesome.css' %}" rel="stylesheet">

    <style>
        /* GLOBAL STYLES */
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            color: #fff;
            background:
                linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
                url("{% static 'images1/207329881-generative-ai-grass-inside-the-football-stadium.jpg' %}") no-repeat center center fixed;
            background-size: cover;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 3px 12px rgba(0,0,0,0.6);
        }

        .navbar .logo {
            font-size: 1.8em;
            font-weight: 700;
            color: #4CAF50;
        }

        .navbar .menu {
            display: flex;
            gap: 20px;
        }

        .navbar .menu a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .navbar .menu a:hover {
            color: #4CAF50;
        }

        /* MAIN CONTAINER */
        .main-container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 20px;
        }

        /* CARD CONTAINER */
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            padding: 30px;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #4CAF50;
            text-align: center;
            font-size: 2rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* CONTENT LAYOUT */
        .turf-content {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 30px;
        }

        .turf-image {
            flex: 1 1 350px;
            text-align: center;
        }

        .turf-image img {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        .turf-details {
            flex: 1 1 400px;
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            padding: 20px 25px;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.1);
        }

        .turf-details h3 {
            color: #4CAF50;
            font-size: 1.3rem;
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(76,175,80,0.4);
            padding-bottom: 5px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px;
            background: rgba(255,255,255,0.07);
            border-radius: 10px;
        }

        .detail-item span:first-child {
            font-weight: 600;
            color: #4CAF50;
        }

        .detail-item span:last-child {
            color: #fff;
        }

        /* BUTTON */
        .book-btn {
            display: block;
            background: #4CAF50;
            color: #fff;
            font-weight: bold;
            font-size: 1.1rem;
            border: none;
            border-radius: 30px;
            padding: 14px 0;
            margin: 35px auto 0;
            text-align: center;
            width: 60%;
            text-decoration: none;
            transition: 0.3s;
        }

        .book-btn:hover {
            background: #388E3C;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        /* RESPONSIVE DESIGN */
        @media (max-width: 900px) {
            .turf-content {
                flex-direction: column;
                text-align: center;
            }
            .turf-details {
                width: 100%;
            }
            .book-btn {
                width: 80%;
            }
        }
    </style>
</head>

<body>

    <!-- ===== NAVBAR ===== -->
    <div class="navbar">
        <div class="logo">BookMyTurf</div>
        <div class="menu">
    <a href="javascript:void(0)" onclick="history.back()">Back</a>
</div>
    </div>

    <!-- ===== TURF DETAILS ===== -->
    <div class="main-container">
        {% for i in r %}
        <div class="card">
            <h2>{{ i.name }}</h2>
            <div class="turf-content">
                <div class="turf-image">
                    <img src="{{ i.photo.url }}" alt="Turf Image">
                </div>

                <div class="turf-details">
                    <h3>Turf Information</h3>
                    <div class="detail-item"><span>📍 Location</span><span>{{ i.location }}</span></div>
                    <div class="detail-item"><span>🏟  Turf Type</span><span>{{ i.surface_type }}</span></div>
                    <div class="detail-item"><span>⏰ Time</span><span>{{ i.time }}</span></div>
                    <div class="detail-item"><span>📞 Phone</span><span>{{ i.phno }}</span></div>
                    <div class="detail-item"><span>💰 Price/hr</span><span>{{ i.pricing }}</span></div>
                </div>
            </div>

            <a href="../book/{{ i.name }}" class="book-btn">Book Slot</a>
        </div>
        {% endfor %}
    </div>

</body>
</html>
